name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'web/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/deploy-cloudrun.yml'
  workflow_dispatch:

env:
  GCP_PROJECT_ID: "shuttle-045094509"
  CLOUD_RUN_SERVICE: "channel-server"
  CLOUD_RUN_REGION: "asia-east1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --source . \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --set-build-env-vars GH_PAT=${{ secrets.GH_PAT }} \
            --update-env-vars DEV_MODE=false,SEED=false \
            --update-secrets DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest \
            --quiet

      - name: Show Cloud Run URL
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --format 'value(status.url)')
          echo "### 部署完成" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: $URL" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL"
