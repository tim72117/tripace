name: Reset Admin Password

# 手動觸發、獨立於部署流程之外——換密碼跟部署是兩件不相關的事,不應該綁在
# 一起(部署觸發密碼重設會有競態/隱性副作用的風險,見專案內部討論)。
#
# 使用步驟:
#   1. 先跑 server/scripts/set-admin-bootstrap-secrets.sh <email> 更新
#      Secret Manager 裡 ADMIN_BOOTSTRAP_PASSWORD 這個 secret 的最新版本值
#      (互動輸入新密碼,不落地在任何指令參數或 log)。
#   2. 到 GitHub Actions 手動觸發這個 workflow,帶要重設的 email。
#
# 新密碼永遠從 Secret Manager 讀最新版本,不在 workflow_dispatch 的輸入框
# 直接打密碼——避免密碼明文出現在 GitHub Actions 的執行紀錄。
on:
  workflow_dispatch:
    inputs:
      email:
        description: '要重設密碼的管理員 email'
        required: true
        type: string

env:
  GCP_PROJECT_ID: "shuttle-045094509"
  CLOUDSQL_INSTANCE: "onagent-prod:asia-east1:onagent-db"

jobs:
  reset-password:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      # DATABASE_URL 這個 secret 存的是 Cloud Run 專用的 Unix socket 連線字串
      # (?host=/cloudsql/...),CI runner 不是跑在 Cloud Run 上沒有那個 socket,
      # 改用 Cloud SQL Auth Proxy 在 runner 本機開一個 TCP port 連線。
      - name: Start Cloud SQL Auth Proxy
        run: |
          curl -o cloud-sql-proxy -sL https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy --port 5432 "${{ env.CLOUDSQL_INSTANCE }}" &
          for i in $(seq 1 30); do
            (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "Cloud SQL Auth Proxy 逾時未就緒" >&2
          exit 1

      # 兩個 secret 各只讀一次、讀到馬上用 add-mask 蓋住,避免明文出現在後續
      # 任何 step 的 log 裡。DATABASE_URL 是 Unix socket 格式的連線字串,這裡
      # 只借用它的 user/password/dbname,host:port 改指向上面起的 proxy。
      - name: Resolve secrets and build connection string
        id: secrets
        run: |
          set -euo pipefail
          RAW_DSN=$(gcloud secrets versions access latest --secret=DATABASE_URL --project="${{ env.GCP_PROJECT_ID }}")
          echo "::add-mask::$RAW_DSN"
          NEW_PASSWORD=$(gcloud secrets versions access latest --secret=ADMIN_BOOTSTRAP_PASSWORD --project="${{ env.GCP_PROJECT_ID }}")
          echo "::add-mask::$NEW_PASSWORD"

          # postgres://USER:PASS@/DBNAME?host=...&sslmode=... 手動拆解(空 host
          # 的 userinfo-only netloc,標準 URL parser 對這種形式不穩定)。
          USERINFO="${RAW_DSN#postgres://}"
          USERINFO="${USERINFO%%@*}"
          PGUSER="${USERINFO%%:*}"
          PGPASSWORD="${USERINFO#*:}"
          echo "::add-mask::$PGPASSWORD"
          REST="${RAW_DSN#*@/}"
          PGDATABASE="${REST%%\?*}"

          DSN="postgres://${PGUSER}:${PGPASSWORD}@127.0.0.1:5432/${PGDATABASE}?sslmode=disable"
          echo "::add-mask::$DSN"
          {
            echo "dsn<<__EOF__"
            echo "$DSN"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
          {
            echo "new_password<<__EOF__"
            echo "$NEW_PASSWORD"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Run adminpasswd
        env:
          DATABASE_URL: ${{ steps.secrets.outputs.dsn }}
          ADMIN_BOOTSTRAP_PASSWORD: ${{ steps.secrets.outputs.new_password }}
        run: |
          cd server
          go run ./cmd/adminpasswd -email "${{ inputs.email }}"
