name: Tripace
options:
  bundleIdPrefix: com.tripace.app
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "945VG76H3Z"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Tripace:
    type: application
    platform: iOS
    sources:
      - path: Tripace
        excludes:
          - Resources/Info.plist
          - Resources/Tripace.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tripace.app.Tripace
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Tripace/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Tripace/Resources/Tripace.entitlements
        # 本地快取用系統內建 SQLite(import SQLite3),連結 libsqlite3。
        OTHER_LDFLAGS: -lsqlite3
