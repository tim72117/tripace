# 本地開發用 Postgres。取代雲端 Neon,方便離線/快速開發測試。
# 用法:
#   docker compose up -d          # 啟動(背景)
#   docker compose down           # 停止(保留資料)
#   docker compose down -v        # 停止並清空資料
#
# server 連線:把 .env 的 DATABASE_URL 指向下方 localhost:5432 即可。
services:
  postgres:
    image: postgres:16-alpine
    container_name: tripace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tripace
      POSTGRES_PASSWORD: tripace
      POSTGRES_DB: tripace
    ports:
      - "5432:5432"
    volumes:
      - tripace-pgdata:/var/lib/postgresql/data
    healthcheck:
      # server 啟動前可確認 DB 已就緒
      test: ["CMD-SHELL", "pg_isready -U tripace -d tripace"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  tripace-pgdata:
