name: Channel
options:
  bundleIdPrefix: com.channel.app
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Channel:
    type: application
    platform: iOS
    sources:
      - path: Channel
        excludes:
          - Resources/Info.plist
          - Resources/Channel.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.channel.app.Channel
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Channel/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Channel/Resources/Channel.entitlements
